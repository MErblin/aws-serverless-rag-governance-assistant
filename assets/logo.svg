<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <circle cx="100" cy="100" r="96" fill="#0d1117" stroke="#30363d" stroke-width="2"/>

  <!-- Document stack — back -->
  <rect x="55" y="55" width="80" height="100" rx="6" fill="#21262d" stroke="#30363d" stroke-width="2"/>

  <!-- Document stack — middle -->
  <rect x="62" y="48" width="80" height="100" rx="6" fill="#161b22" stroke="#30363d" stroke-width="2"/>

  <!-- Document stack — front -->
  <rect x="70" y="40" width="80" height="100" rx="6" fill="#0d1117" stroke="#58a6ff" stroke-width="2.5"/>

  <!-- Text lines on front doc -->
  <rect x="80" y="55" width="55" height="4" rx="1.5" fill="#30363d"/>
  <rect x="80" y="65" width="45" height="4" rx="1.5" fill="#30363d"/>
  <rect x="80" y="75" width="60" height="4" rx="1.5" fill="#30363d"/>

  <!-- Highlighted answer line -->
  <rect x="80" y="90" width="50" height="5" rx="1.5" fill="#f0a500"/>

  <rect x="80" y="103" width="40" height="4" rx="1.5" fill="#30363d"/>
  <rect x="80" y="113" width="55" height="4" rx="1.5" fill="#30363d"/>
  <rect x="80" y="123" width="35" height="4" rx="1.5" fill="#30363d"/>

  <!-- Chat arrow pointing at the highlighted line -->
  <path d="M 158 92 L 145 92 L 152 88 M 145 92 L 152 96"
        fill="none" stroke="#f0a500" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Small Q badge -->
  <circle cx="168" cy="92" r="9" fill="#f0a500"/>
  <text x="168" y="96" font-family="monospace" font-size="11" font-weight="bold" fill="#0d1117" text-anchor="middle">Q</text>
</svg>
